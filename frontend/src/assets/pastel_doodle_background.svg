<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-label="Soft pastel doodle website background">
  <defs>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#6b7280" flood-opacity="0.12"/>
    </filter>
    <filter id="paperGrain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.045"/>
      </feComponentTransfer>
    </filter>
    <style>
      .line { fill: none; stroke: #2d3142; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .thin { fill: none; stroke: #2d3142; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .tiny { fill: none; stroke: #2d3142; stroke-width: 2.3; stroke-linecap: round; stroke-linejoin: round; }
      .pink { fill: #f8bfd0; }
      .blue { fill: #cfefff; }
      .cyan { fill: #bdf3f2; }
      .lav { fill: #ded2ff; }
      .purple { fill: #d8c2ff; }
      .peach { fill: #ffd5bd; }
      .yellow { fill: #ffecaa; }
      .wash { opacity: 0.78; filter: url(#softShadow); }
      .soft { opacity: 0.42; }
    </style>
  </defs>

  <rect width="1920" height="1080" fill="#fffaf3"/>
  <rect width="1920" height="1080" fill="#ffffff" opacity="0.42"/>
  <rect width="1920" height="1080" filter="url(#paperGrain)" opacity="0.55"/>

